{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <a class="navbar-brand" href="{% url 'task:index' %}">TaskFlow</a>

    <div class="navbar-nav mx-auto">
        <a class="nav-link" href="{% url 'task:task-list' %}" style="color:#8892a4;">Tasks</a>
        <a class="nav-link" href="{% url 'task:worker-list' %}" style="color:#8892a4;">Team</a>
    </div>

    <div class="ml-auto d-flex align-items-center">
        {% if user.is_authenticated %}
            <a href="{% url 'task:worker-detail' user.slug %}" class="mr-3" style="color:#8892a4;">
                {% if user.image %}
                    <img src="{{ user.image.url }}" class="rounded-circle mr-1" style="width:28px;height:28px;object-fit:cover;">
                {% endif %}
                {{ user.username }}
            </a>
            <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-secondary btn-sm">Log out</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-sm mr-2">Log in</a>
            <a href="{% url 'task:worker-create' %}" class="btn btn-primary btn-sm">Get started</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
